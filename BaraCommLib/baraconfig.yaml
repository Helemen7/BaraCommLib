# BaraCommLib - Hardware Configuration Template

robot:
  name: "Capybara-Default"
  version: "1.0.0"
  base_speed: 100   # Default speed to use during movements unless specifically overridden

drivetrain:
  # Configuration for H-Bridge connected motors (e.g. L298N, TB6612FNG)
  max_pwm_value: 100  # Cap the maximum PWM allowed to protect hardware
  motors:
    left: # Commonly referred to as Motor A
      in1: 12
      in2: 13
      pwm: 19
      mounted_backwards: false # Set to true if the robot spins instead of going forward
    right: # Commonly referred to as Motor B
      in1: 14
      in2: 18
      pwm: 29
      mounted_backwards: false

  encoders:   # Currently not implemented as I do not have any way to try them
    # Optional setup for wheel encoders (odometry)
    exists: false   # Setting this to false safely ignores encoder initialization
    left:
      pin_a: 32
      pin_b: 33
    right:
      pin_a: 34
      pin_b: 35

sensors:
  buses:
    # Definition of I2C/SPI buses used by the sensors
    - id: "i2c_1"
      type: "i2c"
      scl_pin: 22
      sda_pin: 21
      frequency: 400000   # Bus clock. Lower this to 100000 if experiencing signal interference

  tof:
    # Time of Flight distance sensors (VL53L0X, VL53L1X, VL53L4CD)
    - id: "front"   # Unique identifier used in your code: robot.sensor.get("front")
      direction: "front" # Logical grouping. You can use ANY string here (e.g., "front", "diagonal_left")
      model: "VL53L1X"   
      bus: "i2c_1"
      xshut_pin: 15     # Essential for multi-sensor setups to avoid I2C address collisions
      default_address: 0x29
      new_address: 0x30 # Unique target address dynamically assigned during boot
    - id: "left"
      direction: "left"
      bus: "i2c_1"
      xshut_pin: 16
      default_address: 0x29
      new_address: 0x31
    - id: "right"
      direction: "right"
      bus: "i2c_1"
      xshut_pin: 17
      default_address: 0x29
      new_address: 0x32

  imu:
    # Inertial Measurement Units (Gyroscopes / Accelerometers)
    - id: "main_gyro"
      model: "BNO085" # Supported: MPU6050, BNO055, BNO085
      bus: "i2c_1"
      address: 0x4A
      # Maps the physical axes of the sensor to the robot's Logical [Yaw, Pitch, Roll]. 
      # 0=X, 1=Y, 2=Z. If your sensor is mounted sideways, you might need [2, 1, 0] or similar.
      axis_mapping: [0, 1, 2] 
      inverted_axes: [false, false, true] # Negates [Yaw, Pitch, Roll] after mapping (true/false)

io:
  buttons:
    # Physical push buttons connected to GPIO
    - id: "start"
      pin: 0
      pull: "up" # Internal pull resistor: 'up', 'down', or 'none'
      debounce_ms: 50 # Prevents ghost triggering when the mechanical contact bounces
  
  leds:
    # Status LEDs
    - id: "status_led"
      pin: 2
      pwm: false # Set to true if it's a breathing/dimmable LED controlled with PWM

vision:
  # Computer Vision subsystem (Background camera polling & TFLite inference)
  enabled: false 
  model_path: "robot_brain.tflite" # Path to the TFLite model generated by AutoTrainer. Leave empty if just fetching frames
  cameras:
    - id: "main_cam"
      source: 0 # Integer for USB/CSI cameras (e.g., 0 for /dev/video0), or string URL for IP streams
      resolution: [640, 480] # The background thread will force this capture resolution
  color_tracking:
    enabled: false
    colors:
      # If you define custom colors here, they will override the hardcoded presets
      custom_red:
        hsv:
          lower: [0, 120, 70]
          upper: [10, 255, 255]
        bgr:
          lower: [0, 0, 150]
          upper: [100, 100, 255]
